<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>找到幸运的你！/ We Want You 👉</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a0533 0%, #2d0a5e 50%, #1a0533 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 30px 40px;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(180, 120, 255, 0.8);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #c9a0ff;
      margin-bottom: 28px;
      letter-spacing: 2px;
    }

    .display-box {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(180, 120, 255, 0.4);
      border-radius: 20px;
      padding: 36px 30px;
      margin-bottom: 28px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 40px rgba(130, 60, 255, 0.2);
      transition: box-shadow 0.3s, border-color 0.3s;
    }

    .display-box.active {
      box-shadow: 0 0 60px rgba(255, 200, 50, 0.4), 0 0 20px rgba(130, 60, 255, 0.4);
      border-color: rgba(255, 200, 50, 0.6);
    }

    #name-en {
      font-size: 2.4rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(255, 200, 50, 0.8);
      line-height: 1.2;
    }

    #name-zh {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f0c040;
      letter-spacing: 4px;
      text-shadow: 0 0 16px rgba(255, 200, 50, 0.5);
    }

    #placeholder-text {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 400;
      letter-spacing: 1px;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      padding: 13px 40px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 1px;
    }

    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124, 58, 237, 0.5);
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.7);
    }

    .btn-start:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.08);
      color: #c9a0ff;
      border: 1.5px solid rgba(180, 120, 255, 0.4);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .counter {
      margin-top: 20px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    .counter span {
      color: #f0c040;
      font-weight: 700;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      top: -10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎉 找到幸运的你！/ We Want You 👉</h1>
  <div class="subtitle">✨ Mid-year Medical Review · Culture Talk</div>

  <div class="display-box" id="display-box">
    <div id="placeholder-text">等待抽取 / Waiting...</div>
    <div id="name-en" style="display:none;"></div>
    <div id="name-zh" style="display:none;"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-start" id="btn-start" onclick="startSelection()">🎲 开始抽取 / Draw</button>
    <button class="btn btn-reset" onclick="resetSelection()">🔄 重置 / Reset</button>
  </div>

  <div class="counter">已抽取 / Drawn: <span id="count">0</span> &nbsp;|&nbsp; 共 / Total: 45</div>
</div>

<script>
  const allNames = [
    { en: "Norah LAI",       zh: "Norah LAI" },
    { en: "Yuanyuan BAI",    zh: "白圆圆" },
    { en: "Xueliang CUI",    zh: "崔雪亮" },
    { en: "Christian CHEN",  zh: "陈斌" },
    { en: "Tina FAN",        zh: "范嘉琦" },
    { en: "Xudong GUO",      zh: "郭旭东" },
    { en: "Junhua HUANG",    zh: "黄军华" },
    { en: "Hanzhang LI",     zh: "李含章" },
    { en: "Yongwen LI",      zh: "李永文" },
    { en: "Yue LI",          zh: "李越" },
    { en: "Xiangying LIANG", zh: "梁湘樱" },
    { en: "Silu LIU",        zh: "刘思露" },
    { en: "Tengfei LIU",     zh: "刘腾飞" },
    { en: "Yulia LIU",       zh: "刘颖中" },
    { en: "Yue LIU",         zh: "刘月" },
    { en: "Yuan LV",         zh: "吕元" },
    { en: "Di MA",           zh: "马迪" },
    { en: "Dongmei MA",      zh: "马冬梅" },
    { en: "Yurong MAO",      zh: "毛宇嵘" },
    { en: "Vivian PAN",      zh: "潘玮炜" },  
    { en: "Yolanda RAO",     zh: "饶秀芹" },
    { en: "Hui SHEN",        zh: "沈慧" },
    { en: "Bin SUN",         zh: "孙斌" },
    { en: "Maggie TIAN",     zh: "田红梅" },
    { en: "Tong TONG",       zh: "佟彤" },
    { en: "Fiona WANG",      zh: "王静" },
    { en: "Junhang WANG",    zh: "王钧堳" },
    { en: "Amber WEI",       zh: "韦薇" },
    { en: "Yuemeng WEN",     zh: "温悦萌" },
    { en: "Tingting WU",     zh: "吴婷婷" },
    { en: "Shuying XIE",     zh: "谢姝颖" },
    { en: "Monica YAN",      zh: "闫萌" },
    { en: "Hongbo YAO",      zh: "姚红波" },
    { en: "Kevin YIN",       zh: "Kevin YIN" },
    { en: "Jinnan ZANG",     zh: "臧今楠" },
    { en: "Dongyin ZHANG",   zh: "章冬银" },
    { en: "Yao YAO",         zh: "姚瑶" },
    { en: "Cherrie TAM",     zh: "Cherrie TAM" },
    { en: "Juan GAO",        zh: "高娟" },
    { en: "Shuai CAO",       zh: "曹帅" },
    { en: "Wenhui WANG",     zh: "王文慧" },
    { en: "Xiling SONG",     zh: "宋析伶" },
    { en: "Yan HUANG",       zh: "黄炎" },
    { en: "Zijian LI",       zh: "李子健" },
    { en: "Qian ZHANG",      zh: "张倩" }
  ];

  let remaining = [...allNames];
  let isRunning = false;
  let animInterval = null;
  let selectedCount = 0;

  function startSelection() {
    if (isRunning) return;
    if (remaining.length === 0) {
      document.getElementById('name-en').textContent = '🎊 所有人已抽完！';
      document.getElementById('name-zh').textContent = 'Everyone has been drawn!';
      showNames();
      return;
    }

    isRunning = true;
    document.getElementById('btn-start').disabled = true;
    document.getElementById('display-box').classList.remove('active');
    document.getElementById('placeholder-text').style.display = 'none';
    showNames();

    let speed = 60;
    let elapsed = 0;
    const duration = 2800;

    function tick() {
      const randomIdx = Math.floor(Math.random() * remaining.length);
      document.getElementById('name-en').textContent = remaining[randomIdx].en;
      document.getElementById('name-zh').textContent = remaining[randomIdx].zh;
      elapsed += speed;

      if (elapsed > duration * 0.6) speed = 130;
      if (elapsed > duration * 0.8) speed = 220;

      if (elapsed >= duration) {
        pickFinal();
      } else {
        animInterval = setTimeout(tick, speed);
      }
    }

    tick();
  }

  function pickFinal() {
    const idx = Math.floor(Math.random() * remaining.length);
    const winner = remaining[idx];
    remaining.splice(idx, 1);
    selectedCount++;

    document.getElementById('name-en').textContent = winner.en;
    document.getElementById('name-zh').textContent = winner.zh;
    document.getElementById('display-box').classList.add('active');
    document.getElementById('count').textContent = selectedCount;

    launchConfetti();
    isRunning = false;
    document.getElementById('btn-start').disabled = false;
  }

  function showNames() {
    document.getElementById('name-en').style.display = 'block';
    document.getElementById('name-zh').style.display = 'block';
  }

  function resetSelection() {
    if (isRunning) {
      clearTimeout(animInterval);
      isRunning = false;
    }
    remaining = [...allNames];
    selectedCount = 0;
    document.getElementById('count').textContent = 0;
    document.getElementById('btn-start').disabled = false;
    document.getElementById('placeholder-text').style.display = 'block';
    document.getElementById('name-en').style.display = 'none';
    document.getElementById('name-zh').style.display = 'none';
    document.getElementById('name-en').textContent = '';
    document.getElementById('name-zh').textContent = '';
    document.getElementById('display-box').classList.remove('active');
  }

  function launchConfetti() {
    const colors = ['#a855f7', '#f0c040', '#ff6b9d', '#00d4ff', '#7fff7f', '#ff9a3c'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.classList.add('confetti-piece');
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width = (Math.random() * 8 + 6) + 'px';
      piece.style.height = (Math.random() * 8 + 6) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
      piece.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }
  }
</script>
</body>
</html>
